version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: nazariy_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_me
      MYSQL_DATABASE: nazariy
      MYSQL_USER: nazariy_user
      MYSQL_PASSWORD: user_password_change_me
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./nazariy-backend/src/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nazariy_network

  # Backend API
  backend:
    build:
      context: ./nazariy-backend
      dockerfile: Dockerfile
    container_name: nazariy_backend
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: nazariy_user
      DB_PASSWORD: user_password_change_me
      DB_NAME: nazariy
      DB_POOL_SIZE: 5
      JWT_SECRET: dev_secret_key_do_not_use_in_production_change_this_to_long_random_string
      TELEGRAM_BOT_TOKEN: YOUR_BOT_TOKEN_HERE
      SUPER_ADMIN_TG_ID: 123456789
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./nazariy-backend/src:/app/src
      - ./nazariy-backend/uploads:/app/uploads
    networks:
      - nazariy_network
    restart: unless-stopped

  # Web Frontend
  web:
    build:
      context: ./nazariy-web
      dockerfile: Dockerfile
    container_name: nazariy_web
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - backend
    networks:
      - nazariy_network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  nazariy_network:
    driver: bridge
