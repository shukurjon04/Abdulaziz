services:
  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: nazariy_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf.tpl:ro
      - ./.env:/etc/nginx/.env:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./nginx-entrypoint.sh:/docker-entrypoint.sh:ro
    env_file: .env
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - backend
      - web
    networks:
      - nazariy_network
    entrypoint: /bin/sh /docker-entrypoint.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot:latest
    container_name: nazariy_certbot
    env_file: .env
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c "certbot certonly --webroot -w /var/www/certbot -d ${DOMAIN} -d www.${DOMAIN} --non-interactive --agree-tos --email ${CERTBOT_EMAIL} --quiet || echo 'Certificate already exists or failed'"
    depends_on:
      - nginx
    networks:
      - nazariy_network
    restart: "no"

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: nazariy_mysql
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./nazariy-backend/src/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nazariy_network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./nazariy-backend
      dockerfile: Dockerfile
    container_name: nazariy_backend
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: ${PORT}
      DB_HOST: mysql
      DB_PORT: ${DB_PORT}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      DB_POOL_SIZE: ${DB_POOL_SIZE}
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      SUPER_ADMIN_TG_ID: ${SUPER_ADMIN_TG_ID}
      FRONTEND_ORIGIN: https://${DOMAIN}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./nazariy-backend/src:/app/src
      - ./nazariy-backend/uploads:/app/uploads
    networks:
      - nazariy_network
    restart: unless-stopped

  # Web Frontend
  web:
    build:
      context: ./nazariy-web
      dockerfile: Dockerfile
    container_name: nazariy_web
    ports:
      - "3000:80"
    env_file: .env
    environment:
      VITE_API_URL: https://${DOMAIN}/api
    depends_on:
      - backend
    networks:
      - nazariy_network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  nazariy_network:
    driver: bridge
